name: Test Telegram Report

on:
  workflow_dispatch:
    inputs:
      market:
        description: 'Market to send (KR/US)'
        required: true
        default: 'KR'
        type: choice
        options:
          - KR
          - US

jobs:
  send-test-report:
    runs-on: ubuntu-latest
    env:
      REPORT_FORMAT_CONFIG: config/report_formats.json
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Build runtime image
      run: docker build -t macro-pulse:test .

    - name: Run unit tests in Docker
      run: |
        docker run --rm \
          -v "$PWD:/app" \
          -w /app \
          macro-pulse:test \
          sh -lc "uv run --frozen python -m unittest discover tests 2>&1 | tee unit-test.log"

    - name: Run Telegram report test in Docker
      run: |
        docker run --rm \
          -e REPORT_FORMAT_CONFIG \
          -e TELEGRAM_BOT_TOKEN \
          -e TELEGRAM_CHAT_ID \
          -v "$PWD:/app" \
          -w /app \
          macro-pulse:test \
          sh -lc "uv run --frozen python src/main.py --market ${{ inputs.market }} 2>&1 | tee macro-pulse.log"

    - name: Upload report artifact
      if: always()
      uses: actions/upload-artifact@v6
      with:
        name: telegram-test-${{ inputs.market }}
        path: |
          macro_pulse_report.html
          macro-pulse.log
          unit-test.log
        if-no-files-found: ignore

    - name: Send failure notification
      if: failure() && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != ''
      run: |
        curl --silent --show-error --fail \
          --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
          --data-urlencode "text=Macro Pulse manual Telegram test failed: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
          "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage"
