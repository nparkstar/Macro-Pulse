name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - "codex/**"

jobs:
  test:
    if: "${{ github.event_name != 'push' || github.event.head_commit.message != 'chore: keep workflows active' }}"
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build runtime image
      run: docker build -t macro-pulse:ci .

    - name: Run unit tests in Docker
      run: |
        docker run --rm \
          -v "$PWD:/app" \
          -w /app \
          macro-pulse:ci \
          sh -lc "uv run --frozen python -m unittest discover tests 2>&1 | tee unit-test.log"

    - name: Upload CI artifacts
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: ci-logs
        path: unit-test.log
        if-no-files-found: ignore
